<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMI Planchaduría</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="panel">
        <h1>HMI Planchaduría</h1>

        <div class="bloque">
            <label for="usuarioGuardar">Agregar usuario</label>
            <input type="number" id="usuarioGuardar" placeholder="Máximo 5 dígitos">
            <button onclick="guardarUsuario()">Guardar usuario</button>
        </div>

        <div class="bloque">
            <label for="usuarioProceso">Usuario para proceso</label>
            <input type="number" id="usuarioProceso" placeholder="Usuario seleccionado">
        </div>

        <div class="bloque">
            <label for="cantidad">Cantidad de prendas</label>
            <input type="number" id="cantidad" min="1" placeholder="Ejemplo: 5">
            <button onclick="guardarCantidad()">Actualizar BD e iniciar proceso</button>
        </div>

        <div class="bloque">
            <button onclick="cargarGaleria()">Ver galería del usuario</button>
        </div>

        <div class="estado-box">
            <p><strong>Usuario actual:</strong> <span id="usuarioActual">-</span></p>
            <p><strong>Cantidad:</strong> <span id="cantidadActual">-</span></p>
            <p><strong>Activo:</strong> <span id="activo">-</span></p>
            <p><strong>Estado:</strong> <span id="estado">-</span></p>
        </div>

        <div class="galeria-box">
            <h3>Galería</h3>
            <div id="galeria" class="galeria"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
