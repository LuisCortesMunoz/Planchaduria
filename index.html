<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Pranchaduría</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="panel">
        <h1>Control de Planchaduría</h1>
        <p>
            Ingresa la cantidad de prendas, activa o desactiva el sistema y revisa la galería de fotos.
        </p>

        <label for="cantidad">Cantidad de prendas</label>
        <input type="number" id="cantidad" min="0" placeholder="Ejemplo: 5">

        <button onclick="guardarCantidad()">Guardar cantidad</button>

        <div class="row">
            <button class="on" onclick="activarSistema()">ON</button>
            <button class="off" onclick="desactivarSistema()">OFF</button>
        </div>

        <button class="gallery" onclick="cargarGaleria()">Ver galería</button>

        <div class="estado-box">
            <h3>Estado actual</h3>
            <p><strong>Activo:</strong> <span id="activo">-</span></p>
            <p><strong>Cantidad:</strong> <span id="cantidadActual">-</span></p>
            <p><strong>Estado:</strong> <span id="estado">-</span></p>
            <p><strong>Última actualización:</strong> <span id="updatedAt">-</span></p>
        </div>

        <div class="galeria-box">
            <h3>Galería</h3>
            <div id="galeria" class="galeria"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
